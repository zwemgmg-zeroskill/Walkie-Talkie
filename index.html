<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis Real-time Walkie-Talkie</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            background-color: #f0f2f5; 
            margin: 0; 
        }
        .container { 
            text-align: center; 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }
        .ptt-btn { 
            width: 150px; 
            height: 150px; 
            border-radius: 50%; 
            border: none; 
            background-color: #007bff; 
            color: white; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            box-shadow: 0 6px 15px rgba(0,123,255,0.4); 
            transition: all 0.2s ease; 
            user-select: none; 
            -webkit-user-select: none; 
        }
        .ptt-btn:active { 
            background-color: #dc3545; 
            transform: scale(0.95); 
            box-shadow: 0 2px 5px rgba(220,53,69,0.4); 
        }
        .status { 
            margin-top: 20px; 
            font-size: 16px; 
            color: #555; 
            font-weight: bold; 
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Oasis Walkie-Talkie</h2>
    <button id="talkBtn" class="ptt-btn">PRESS & HOLD<br>TO TALK</button>
    <div id="status" class="status">အဆင်သင့်ဖြစ်ပါပြီ</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // Koko ပေးထားတဲ့ Configuration အချက်အလက်များကို ဖြည့်သွင်းထားပါတယ်
    const firebaseConfig = {
        apiKey: "AIzaSyC3C3XxNy92pBy26GGk0Kk9bD6zavdto0o",
        authDomain: "walkie-talkie-f62d9.firebaseapp.com",
        databaseURL: "https://walkie-talkie-f62d9-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "walkie-talkie-f62d9",
        storageBucket: "walkie-talkie-f62d9.firebasestorage.app",
        messagingSenderId: "86152838514",
        appId: "1:86152838514:web:d3f80e0b06a28c7fe471eb",
        measurementId: "G-92Y1KS4QRZ"
    };
    
    // Firebase စတင်ပတ်မောင်းခြင်း
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const audioRef = database.ref('walkie_talkie/current_audio');

    let mediaRecorder;
    let audioChunks = [];
    const talkBtn = document.getElementById('talkBtn');
    const statusText = document.getElementById('status');

    // မိုက်ခရိုဖုန်း အသုံးပြုခွင့် တောင်းဆိုခြင်း
    navigator.mediaDevices.getUserMedia({ audio: true })
        .then(stream => {
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = event => { audioChunks.push(event.data); };
            mediaRecorder.onstop = () => {
                statusText.innerText = "အသံပို့နေသည်...";
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.readAsDataURL(audioBlob);
                reader.onloadend = () => {
                    // အသံဖိုင်ကို Database ပေါ်သို့ Real-time ပို့ပေးခြင်း
                    audioRef.set({
                        audioData: reader.result,
                        timestamp: Date.now()
                    });
                    statusText.innerText = "ပို့ပြီးပါပြီ";
                };
            };
        })
        .catch(err => {
            console.error("Microphone Access Error: ", err);
            statusText.innerText = "Microphone သုံးခွင့်ပေးဖို့ လိုအပ်ပါတယ်ရှင်။";
        });

    // --- PC Events ---
    talkBtn.addEventListener('mousedown', startRecording);
    talkBtn.addEventListener('mouseup', stopRecording);
    
    // --- Mobile Events ---
    talkBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(); });
    talkBtn.addEventListener('touchend', (e) => { e.preventDefault(); stopRecording(); });

    function startRecording() {
        if (mediaRecorder && mediaRecorder.state === "inactive") {
            audioChunks = [];
            mediaRecorder.start();
            statusText.innerText = "ပြောနိုင်ပါပြီ (အသံဖမ်းနေသည်...)";
        }
    }
    function stopRecording() {
        if (mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.stop();
        }
    }

    // အခြားဖုန်း/စက်မှ အသံလှိုင်းအသစ် ရောက်လာပါက အလိုအလျောက် ဖွင့်ပေးမည့်အပိုင်း
    let lastTimestamp = Date.now();
    audioRef.on('value', snapshot => {
        const data = snapshot.val();
        if (data && data.timestamp > lastTimestamp) {
            lastTimestamp = data.timestamp;
            statusText.innerText = "အသံမက်ဆေ့ခ်ျ ရောက်လာပါပြီ...";
            const audio = new Audio(data.audioData);
            audio.play().then(() => {
                statusText.innerText = "အဆင်သင့်ဖြစ်ပါပြီ";
            }).catch(e => console.error("Audio Playback Error: ", e));
        }
    });
</script>

</body>
</html>
