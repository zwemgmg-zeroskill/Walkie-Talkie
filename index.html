<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis Real-time Walkie-Talkie</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151c2c;
            --primary-color: #00ecbc;
            --recording-color: #ff3860;
            --text-main: #ffffff;
            --text-muted: #6b7c96;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            background-color: var(--bg-color); 
            margin: 0;
            overflow: hidden;
        }

        .container { 
            text-align: center; 
            background: var(--card-bg); 
            padding: 40px 30px; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1); 
            width: 85%;
            max-width: 360px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        h2 {
            color: var(--text-main);
            margin: 0 0 8px 0;
            font-size: 24px;
            letter-spacing: 0.5px;
        }

        .brand-sub {
            color: var(--primary-color);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 35px;
            font-weight: 600;
        }

        /* PTT Button Outer Ring & Pulse Effect */
        .btn-wrapper {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 0 auto 35px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pulse-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: var(--primary-color);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1;
        }

        .btn-wrapper.recording .pulse-ring {
            background-color: var(--recording-color);
            animation: ripple 1.5s infinite ease-in-out;
            opacity: 0.4;
        }

        .ptt-btn { 
            position: relative;
            z-index: 2;
            width: 160px; 
            height: 160px; 
            border-radius: 50%; 
            border: none; 
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: var(--primary-color); 
            font-size: 15px; 
            font-weight: 700; 
            cursor: pointer; 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5), inset 0 2px 3px rgba(255,255,255,0.1);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none; 
            -webkit-user-select: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 2px solid rgba(0, 236, 188, 0.2);
        }

        .ptt-btn svg {
            width: 32px;
            height: 32px;
            fill: currentColor;
            transition: transform 0.2s ease;
        }

        /* Active State (Holding Down) */
        .btn-wrapper.recording .ptt-btn { 
            color: #ffffff;
            background: linear-gradient(135deg, #ff4d6d, #c9184a);
            border-color: transparent;
            transform: scale(0.96);
            box-shadow: 0 4px 10px rgba(255, 56, 96, 0.3);
        }

        .status-panel {
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .status-title {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .status { 
            font-size: 15px; 
            color: var(--text-main); 
            font-weight: 500;
        }

        .btn-wrapper.recording ~ .status-panel .status {
            color: var(--recording-color);
        }

        @keyframes ripple {
            0% { transform: scale(0.9); opacity: 0.8; }
            100% { transform: scale(1.3); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Oasis Walkie-Talkie</h2>
    <div class="brand-sub">Radio Terminal</div>
    
    <div class="btn-wrapper" id="btnWrapper">
        <div class="pulse-ring"></div>
        <button id="talkBtn" class="ptt-btn">
            <svg viewBox="0 0 24 24">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
            </svg>
            <span>PUSH TO TALK</span>
        </button>
    </div>
    
    <div class="status-panel">
        <div class="status-title">System Status</div>
        <div id="status" class="status">အဆင်သင့်ဖြစ်ပါပြီ</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC3C3XxNy92pBy26GGk0Kk9bD6zavdto0o",
        authDomain: "walkie-talkie-f62d9.firebaseapp.com",
        databaseURL: "https://walkie-talkie-f62d9-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "walkie-talkie-f62d9",
        storageBucket: "walkie-talkie-f62d9.firebasestorage.app",
        messagingSenderId: "86152838514",
        appId: "1:86152838514:web:d3f80e0b06a28c7fe471eb",
        measurementId: "G-92Y1KS4QRZ"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const audioRef = database.ref('walkie_talkie/current_audio');

    let mediaRecorder;
    let audioChunks = [];
    const talkBtn = document.getElementById('talkBtn');
    const btnWrapper = document.getElementById('btnWrapper');
    const statusText = document.getElementById('status');

    navigator.mediaDevices.getUserMedia({ audio: true })
        .then(stream => {
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = event => { audioChunks.push(event.data); };
            mediaRecorder.onstop = () => {
                statusText.innerText = "အသံလှိုင်း ပေးပို့နေသည်...";
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.readAsDataURL(audioBlob);
                reader.onloadend = () => {
                    audioRef.set({
                        audioData: reader.result,
                        timestamp: Date.now()
                    });
                    statusText.innerText = "မက်ဆေ့ခ်ျ ပို့ပြီးပါပြီ";
                    setTimeout(() => { statusText.innerText = "အဆင်သင့်ဖြစ်ပါပြီ"; }, 1500);
                };
            };
        })
        .catch(err => {
            console.error(err);
            statusText.innerText = "Microphone Access Denied";
        });

    // Event Listeners for UI & Recording
    talkBtn.addEventListener('mousedown', startRecording);
    talkBtn.addEventListener('mouseup', stopRecording);
    talkBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(); });
    talkBtn.addEventListener('touchend', (e) => { e.preventDefault(); stopRecording(); });

    function startRecording() {
        if (mediaRecorder && mediaRecorder.state === "inactive") {
            audioChunks = [];
            mediaRecorder.start();
            btnWrapper.classList.add('recording');
            statusText.innerText = "အသံဖမ်းနေပါသည်... (ပြောနိုင်ပါပြီ)";
        }
    }

    function stopRecording() {
        if (mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.stop();
            btnWrapper.classList.remove('recording');
        }
    }

    // Real-time Audio Listener
    let lastTimestamp = Date.now();
    audioRef.on('value', snapshot => {
        const data = snapshot.val();
        if (data && data.timestamp > lastTimestamp) {
            lastTimestamp = data.timestamp;
            statusText.innerText = "အသံဝင်လာနေပါသည်...";
            const audio = new Audio(data.audioData);
            audio.play().then(() => {
                statusText.innerText = "အဆင်သင့်ဖြစ်ပါပြီ";
            }).catch(e => console.error(e));
        }
    });
</script>

</body>
</html>
